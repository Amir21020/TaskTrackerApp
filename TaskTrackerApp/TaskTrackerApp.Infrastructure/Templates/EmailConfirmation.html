<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email confirmation</title>
</head>
<body style="margin:0;padding:0;background-color:#f2f2f2;font-family:Arial,Helvetica,sans-serif;color:#111111;">
    <div style="display:none;max-height:0px;overflow:hidden;font-size:0px;color:#f2f2f2;">
        Your verification code for {{AppName}}: {{ConfirmationCode}}
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td style="padding:10px 20px;background-color:#f3e8ff;border:1px solid #d8b4fe;border-radius:8px;font-size:24px;letter-spacing:4px;font-weight:700;color:#111111;text-align:center;">
                            {{ConfirmationCode}}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
</html>
